<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Avtomobillar, elektromobillar, xususiyatlari va narxlari bo'yicha to'liq ma'lumotlar.">
    <title>🚗 Avtomobillar | Eng Yaxshisini Tanlang</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #dc3545;
            --dark-color: #5a0b1a;
            --light-color: #f8f9fa;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: var(--light-color); color: #333; line-height: 1.6; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        
        header { background: var(--primary-color); color: white; padding: 20px 0; }
        .header-container { display: flex; justify-content: space-between; align-items: center; }
        
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; margin: 40px 0; }
        .product-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1); transition: 0.3s; }
        .product-card:hover { transform: translateY(-5px); }
        
        .synthesis-block { background: #fff3f3; padding: 15px; border-left: 4px solid var(--primary-color); margin: 15px 0; border-radius: 5px; }
        .view-comparison-btn { display: block; background: var(--dark-color); color: white; text-align: center; padding: 10px; text-decoration: none; border-radius: 5px; margin-top: 10px; }
        
        .ad-unit { background: #eee; padding: 20px; text-align: center; margin: 30px 0; border: 1px dashed #ccc; }
        
        @media (max-width: 768px) { .header-container { flex-direction: column; gap: 15px; } }
    </style>
</head>
<body>

    <header>
        <div class="container header-container">
            <div class="logo"><h2>🚗 Eng Yaxshisini Tanlang</h2></div>
            <nav><ul><a href="index.html" style="color:white; text-decoration:none;">Bosh Sahifa</a></ul></nav>
        </div>
    </header>

    <div class="container">
        <div class="products-grid">
            <!-- Product 3 -->
            <div class="product-card">
                <div class="product-content">
                    <h3>Chevrolet Lacetti vs Ravon Nexia 3</h3>
                    <p>Iqtisodiy avtomobillar solishtiruvi.</p>
                    
                    <div class="synthesis-block">
                        <h4>Test Xulosasi</h4>
                        <p><strong>G'olib: Chevrolet Lacetti</strong><br>
                        <strong>Sabab:</strong> Lacetti mustahkam osma tizimi va salon qulayligi bilan Nexia 3 dan ustun.</p>
                    </div>

                    <a href="Lacetti-Nexia.html" class="view-comparison-btn">To'liq tahlilni ko'rish →</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        console.log("Sahifa yuklandi.");
    </script>
</body>
</html>
